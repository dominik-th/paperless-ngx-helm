{{- /*
  Helm test pods that verify connectivity between Paperless-NGX and its
  dependencies.  Each pod is run once by `helm test` and must exit 0 to pass.
*/ -}}

{{- if .Values.redis.enabled }}
---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "paperless-ngx.fullname" . }}-test-redis"
  labels:
    {{- include "paperless-ngx.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  containers:
    - name: redis-ping
      image: "redis:7-alpine"
      command:
        - /bin/sh
        - -c
        - |
          redis-cli -h {{ include "paperless-ngx.redisServiceName" . }} ping | grep -q PONG \
            && echo "Redis connection OK"
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
{{- end }}

{{- if .Values.cnpg.enabled }}
---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "paperless-ngx.fullname" . }}-test-postgres"
  labels:
    {{- include "paperless-ngx.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  containers:
    - name: postgres-check
      image: "postgres:16"
      command:
        - pg_isready
        - -h
        - {{ include "paperless-ngx.postgresServiceName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
{{- end }}

---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "paperless-ngx.fullname" . }}-test-api"
  labels:
    {{- include "paperless-ngx.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  containers:
    - name: api-check
      image: "curlimages/curl:8.18.0"
      command:
        - curl
        - --fail
        - --silent
        - --show-error
        - "http://{{ include "paperless-ngx.fullname" . }}:{{ .Values.paperless.service.port }}/api/"
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL

