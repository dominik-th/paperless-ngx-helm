apiVersion: v2
name: paperless-ngx
description: >
  A fully-featured Helm chart for Paperless-NGX with PostgreSQL (CloudNativePG),
  Redis, Gotenberg and Tika.
type: application
# Chart version follows the pattern <appVersion>-<chart-patch> so that the
# chart can be updated independently of Paperless-NGX releases.
# Bump the chart-patch suffix (e.g. 2.14.7-1) for chart-only changes.
version: 2.14.7-0
appVersion: "2.14.7"
keywords:
  - paperless
  - document-management
  - dms
home: https://github.com/paperless-ngx/paperless-ngx
sources:
  - https://github.com/paperless-ngx/paperless-ngx
maintainers:
  - name: kernelb00t
icon: https://raw.githubusercontent.com/paperless-ngx/paperless-ngx/main/docs/assets/favicon.png
