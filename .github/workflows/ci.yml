name: Helm Chart CI

on:
  push:
    branches:
      - "main"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 0.1 – Validate GitHub Actions
  # ---------------------------------------------------------------------------
  validate-actions:
    name: Validate GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Actions
        uses: mpalmer/action-validator@v2
        with:
          directory: .github/workflows

  # ---------------------------------------------------------------------------
  # Job 0.2 – Detect whether CI should run for this change set
  # ---------------------------------------------------------------------------
  changes:
    name: Detect chart-related changes
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.filter.outputs.run_ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            run_ci:
              - "paperless-ngx/**"
              - "ct.yaml"
              - ".github/workflows/ci.yml"


  # ---------------------------------------------------------------------------
  # Job 1.1 – Kube-linter: static security and best practices analysis
  # ---------------------------------------------------------------------------
  kube-linter:
    name: Kube-linter
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Scan chart with kube-linter
        uses: stackrox/kube-linter-action@v1
        with:
          directory: paperless-ngx
          format: sarif
          output-file: kube-linter.sarif
        continue-on-error: true # Don't block yet, just report

      - name: Upload kube-linter SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: kube-linter.sarif
          category: kube-linter

  # ---------------------------------------------------------------------------
  # Job 1 – Lint: static validation without a running cluster
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes, validate-actions]
    if: needs.changes.outputs.run_ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Render chart templates
        run: |
          helm template paperless-ngx ./paperless-ngx \
            --values paperless-ngx/ci/ct-values.yaml \
            --debug > /dev/null

      - name: Run chart-testing (lint)
        run: ct lint --config ct.yaml --all

  # ---------------------------------------------------------------------------
  # Job 2 – Integration: full cluster deployment on KinD
  # ---------------------------------------------------------------------------
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.run_ci == 'true'
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Create KinD cluster
        uses: helm/kind-action@v1

      - name: Install CloudNativePG operator
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm upgrade --install cnpg cnpg/cloudnative-pg \
            --namespace cnpg-system \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Install Helm chart
        run: |
          helm install paperless-ngx ./paperless-ngx \
            --values paperless-ngx/ci/ct-values.yaml \
            --set "paperless.secrets.PAPERLESS_SECRET_KEY=$(openssl rand -hex 32)" \
            --set "paperless.secrets.PAPERLESS_ADMIN_PASSWORD=$(openssl rand -hex 16)" \
            --namespace paperless-test \
            --create-namespace \
            --timeout 15m

      - name: Wait for CNPG cluster to be ready
        run: |
          kubectl wait cluster/paperless-ngx-postgres \
            --for=condition=Ready \
            --timeout=300s \
            --namespace paperless-test

      - name: Wait for deployments to be available
        run: |
          kubectl rollout status deployment/paperless-ngx-redis \
            --namespace paperless-test --timeout=2m
          kubectl rollout status deployment/paperless-ngx-gotenberg \
            --namespace paperless-test --timeout=2m
          kubectl rollout status deployment/paperless-ngx-tika \
            --namespace paperless-test --timeout=2m
          kubectl rollout status deployment/paperless-ngx \
            --namespace paperless-test --timeout=10m

      - name: Run Helm tests
        run: |
          helm test paperless-ngx \
            --namespace paperless-test \
            --timeout 5m

      - name: Smoke test (HTTP GET)
        run: |
          # Get the service URL (KinD cluster, so we use kubectl port-forward or just curl from within the cluster)
          # We'll use a temporary pod to curl the service to avoid port-forwarding complexity in CI
          kubectl run smoke-test --rm -i --restart=Never --image=curlimages/curl --namespace paperless-test -- \
            curl -sSL -o /dev/null -w "%{http_code}" http://paperless-ngx:8000/api/ \
            | grep -E "200|302"

      - name: Check Paperless-NGX logs for errors
        run: |
          echo "=== Paperless-NGX container logs ==="
          kubectl logs deployment/paperless-ngx \
            --namespace paperless-test \
            --tail=500

          ERRORS=$(kubectl logs deployment/paperless-ngx \
            --namespace paperless-test \
            --tail=500 \
            | grep -E "^\s*\[?(ERROR|CRITICAL)\]?" \
            || true)

          if [ -n "$ERRORS" ]; then
            echo "::error::Errors found in Paperless-NGX logs:"
            echo "$ERRORS"
            exit 1
          fi

          echo "No errors found in Paperless-NGX logs."

      - name: Print diagnostics on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods --namespace paperless-test -o wide

          echo "=== Recent events ==="
          kubectl get events --namespace paperless-test \
            --sort-by='.lastTimestamp' | tail -40

          echo "=== Paperless-NGX logs ==="
          kubectl logs deployment/paperless-ngx \
            --namespace paperless-test --tail=200 || true

          echo "=== Redis logs ==="
          kubectl logs deployment/paperless-ngx-redis \
            --namespace paperless-test --tail=50 || true

          echo "=== CNPG cluster status ==="
          kubectl describe cluster/paperless-ngx-postgres \
            --namespace paperless-test || true

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: k8s-diagnostics
          path: |
            *.log
            kube-linter.sarif
          retention-days: 5
